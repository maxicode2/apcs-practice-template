name: Run Unit Tests

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Select which test file to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - GuessingGameTest.java
          - ScoreboardTest.java
          - WordCheckerTest.java

jobs:
  run_tests:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with Maven
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.test_file }}" != "all" ]; then
            mvn -B package -Dtest=${{ inputs.test_file }} --file pom.xml
          else
            mvn -B package --file pom.xml
          fi

      - name: Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true
